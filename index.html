<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodge Runner Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        #gameContainer {
            position: relative;
        }

        canvas {
            border: 3px solid #00d4ff;
            box-shadow: 0 0 30px #00d4ff, inset 0 0 20px rgba(0, 212, 255, 0.1);
            background: linear-gradient(180deg, #1a1a3a 0%, #0a0a1a 100%);
            display: block;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px #00d4ff;
        }

        #menu,
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #gameOver {
            display: none;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
            color: #ccc;
        }

        button {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(180deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px;
            color: #000;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
            transition: transform 0.1s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        #controls {
            margin-top: 20px;
            font-size: 16px;
            color: #aaa;
        }

        #mobileBtns {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
        }

        .mobileBtn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.3);
            border: 2px solid #00d4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            user-select: none;
        }

        @media (max-width: 900px) {
            #mobileBtns {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <div id="gameContainer">
        <canvas id="game" width="900" height="350"></canvas>

        <div id="ui">
            <div>Puntaje: <span id="score">0</span></div>
            <div>Récord: <span id="best">0</span></div>
        </div>

        <div id="menu">
            <h1>🏃 DODGE RUNNER</h1>
            <p>Esquiva los obstáculos y consigue el mayor puntaje</p>
            <button onclick="startGame()">JUGAR</button>
            <div id="controls">
                <p>💻 PC: ESPACIO saltar | S agacharse | P pausa</p>
                <p>📱 Móvil: Botones de abajo</p>
            </div>
        </div>

        <div id="gameOver">
            <h1>GAME OVER</h1>
            <p id="finalScore">Puntaje: 0</p>
            <p id="newBest" style="color:#00ff88; display:none;">¡NUEVO RÉCORD!</p>
            <button onclick="startGame()">REINTENTAR</button>
            <button onclick="goMenu()">MENÚ</button>
        </div>

        <div id="mobileBtns">
            <div class="mobileBtn" id="jumpBtn">↑</div>
            <div class="mobileBtn" id="duckBtn">↓</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // Audio con Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration, type = 'square') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq; osc.type = type;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // Estado del juego
        let gameState = 'menu';
        let score = 0, best = localStorage.getItem('dodgeBest') || 0;
        let speed = 6, obstacleTimer = 0;
        document.getElementById('best').textContent = best;

        const player = {
            x: 80, y: 260, w: 35, h: 50, vy: 0,
            grounded: true, ducking: false, alive: true
        };

        let obstacles = [];
        let particles = [];
        let clouds = Array(5).fill().map((_, i) => ({ x: i * 200, y: 30 + Math.random() * 50, s: 0.5 + Math.random() * 0.5 }));

        const gravity = 0.9;
        const groundY = 310;

        // Controles
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && player.grounded && gameState === 'playing') jump();
            if (e.code === 'KeyS' && gameState === 'playing') duck(true);
            if (e.code === 'KeyP' && gameState === 'playing') togglePause();
        });
        document.addEventListener('keyup', e => {
            if (e.code === 'KeyS') duck(false);
        });

        document.getElementById('jumpBtn').addEventListener('touchstart', jump);
        document.getElementById('duckBtn').addEventListener('touchstart', () => duck(true));
        document.getElementById('duckBtn').addEventListener('touchend', () => duck(false));

        function jump() {
            if (player.grounded) {
                player.vy = -18;
                player.grounded = false;
                playSound(800, 0.1);
            }
        }
        function duck(state) {
            player.ducking = state;
            player.h = state ? 25 : 50;
            player.y = state ? 285 : 260;
        }
        function togglePause() {
            gameState = gameState === 'playing' ? 'paused' : 'playing';
            if (gameState === 'playing') gameLoop();
        }

        function startGame() {
            audioCtx.resume();
            gameState = 'playing';
            score = 0; speed = 6; obstacles = []; particles = [];
            player.y = 260; player.vy = 0; player.alive = true; player.ducking = false; player.h = 50;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            gameLoop();
        }

        function goMenu() {
            gameState = 'menu';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }

        function spawnObstacle() {
            let type = Math.random() > 0.6 ? 'bird' : 'cactus';
            obstacles.push({
                x: 900,
                y: type === 'bird' ? 230 : 280,
                w: type === 'bird' ? 40 : 25,
                h: type === 'bird' ? 25 : 30,
                type: type,
                passed: false
            });
        }

        function createParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 5, vy: Math.random() * -5,
                    life: 30, color: `hsl(${Math.random() * 60 + 10},100%,50%)`
                });
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            // Player physics
            player.vy += gravity;
            player.y += player.vy;
            if (player.y >= groundY - player.h) {
                player.y = groundY - player.h;
                player.vy = 0;
                player.grounded = true;
            }

            // Clouds
            clouds.forEach(c => {
                c.x -= c.s;
                if (c.x < -100) c.x = 900;
            });

            // Obstacles
            obstacleTimer++;
            if (obstacleTimer > 90 - speed * 5) {
                spawnObstacle();
                obstacleTimer = 0;
            }

            obstacles.forEach((obs, i) => {
                obs.x -= speed;

                // Score when passed
                if (!obs.passed && obs.x + obs.w < player.x) {
                    obs.passed = true;
                    score++;
                    playSound(600, 0.05, 'sine');
                    if (score % 5 === 0) speed += 0.3;
                }

                // Collision
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                    player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    gameOver();
                }

                if (obs.x < -50) obstacles.splice(i, 1);
            });

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            });

            document.getElementById('score').textContent = score;
        }

        function draw() {
            // Background
            ctx.clearRect(0, 0, 900, 350);

            // Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, 20, 0, Math.PI * 2);
                ctx.arc(c.x + 20, c.y, 15, 0, Math.PI * 2);
                ctx.fill();
            });

            // Ground
            ctx.fillStyle = '#2a2a4a';
            ctx.fillRect(0, groundY, 900, 40);
            ctx.fillStyle = '#3a3a5a';
            for (let i = 0; i < 900; i += 30) ctx.fillRect(i, groundY, 15, 3);

            // Player - gato ninja simple
            ctx.fillStyle = '#ffaa00';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = 'black';
            ctx.fillRect(player.x + 8, player.y + 10, 6, 6); // ojo
            ctx.fillRect(player.x + 22, player.y + 10, 6, 6);
            if (!player.ducking) {
                ctx.fillStyle = '#ff8800';
                ctx.fillRect(player.x + 5, player.y - 10, 25, 15); // oreja/capucha
            }

            // Obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.type === 'bird' ? '#ff4444' : '#44ff44';
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                if (obs.type === 'bird') {
                    ctx.fillStyle = 'yellow';
                    ctx.fillRect(obs.x + 15, obs.y + 5, 5, 5);
                }
            });

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, 4, 4);
                ctx.globalAlpha = 1;
            });

            // Pause overlay
            if (gameState === 'paused') {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 900, 350);
                ctx.fillStyle = 'white';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSA', 450, 175);
                ctx.textAlign = 'left';
            }
        }

        function gameOver() {
            gameState = 'gameOver';
            player.alive = false;
            createParticles(player.x + player.w / 2, player.y + player.h / 2);
            playSound(200, 0.5, 'sawtooth');

            let isNewBest = score > best;
            if (isNewBest) {
                best = score;
                localStorage.setItem('dodgeBest', best);
                document.getElementById('best').textContent = best;
                document.getElementById('newBest').style.display = 'block';
            } else {
                document.getElementById('newBest').style.display = 'none';
            }

            document.getElementById('finalScore').textContent = `Puntaje: ${score}`;
            setTimeout(() => { document.getElementById('gameOver').style.display = 'flex'; }, 500);
        }

        function gameLoop() {
            update();
            draw();
            if (gameState === 'playing') requestAnimationFrame(gameLoop);
        }

        // Dibujar menú inicial
        draw();
    </script>
</body>

</html>
